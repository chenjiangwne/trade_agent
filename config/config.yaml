basic:
  platform: binance
  symbol: BTCUSDT
  timeframe_1h: 1h
  timeframe_4h: 4h
  timeframe_daily: 1d
  buypoint: 40
  buypoint_step: 100
  mode: paper
  max_attempts: 3

data:
  backup_platforms:
    - okx
  realdata_dir: realdatas
  kline_1h_file: realdatas/BTC_USDT_3year_1h.xlsx
  kline_4h_file: realdatas/BTC_USDT_3year_4h.xlsx
  kline_1d_file: realdatas/BTC_USDT_3year_daily.xlsx
  fetch_limit_1h: 1000
  fetch_limit_4h: 500
  fetch_limit_1d: 300
  sync_on_start: true
  validation:
    min_rows_1h: 200
    min_rows_4h: 200
    min_rows_1d: 60
    max_sync_attempts: 3

status:
  status_file: config/status.json

trade:
  paper_trade: false
  quantity: 0.001

network:
  proxy: "http://127.0.0.1:7897"

notify:
  channel: wecom
  webhook: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=92c5f010-1722-4528-b911-b72ca8403cc3"

runtime:
  run_forever: true
  run_delay_seconds: 5
  max_clock_diff_seconds: 60

backtest:
  strategy_mode: long_first_then_short
  eval_exit:
    enabled: true
  eval_execution_15m:
    enabled: false
  back_test:
    enabled: true

logging:
  console:
    enabled: true
    level: DEBUG
    format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{message}</cyan>"
  file:
    enabled: true
    level: DEBUG
    path: "D:/RobotTest/workspace/trade_agent/reports"
    rotation: "100 MB"
    retention: "7 days"
    compression: "zip"
